<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SummaRead</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  </head>
  <body class="w-80 bg-gray-50 text-gray-900">
    <main class="space-y-4 p-4">
      <header class="space-y-1">
        <h1 class="text-lg font-semibold">SummaRead</h1>
        <p class="text-sm text-gray-600">Accessibility reading controls</p>
      </header>

      <section class="space-y-3">
        <label class="block space-y-1">
          <span class="text-sm font-medium">Font size</span>
          <input id="fontSizeScale" class="w-full" type="range" min="0.8" max="1.6" step="0.1">
        </label>

        <label class="block space-y-1">
          <span class="text-sm font-medium">Line height</span>
          <input id="lineHeightScale" class="w-full" type="range" min="1.2" max="2.2" step="0.1">
        </label>

        <label class="block space-y-1">
          <span class="text-sm font-medium">Letter spacing</span>
          <input id="letterSpacing" class="w-full" type="range" min="0" max="4" step="0.5">
        </label>

        <label class="block space-y-1">
          <span class="text-sm font-medium">Font family</span>
          <select id="fontFamily" class="w-full rounded border border-gray-300 bg-white px-2 py-2 text-sm">
            <option value="default">Default</option>
            <option value="Arial, sans-serif">Arial</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="'Atkinson Hyperlegible', Arial, sans-serif">Atkinson Hyperlegible</option>
          </select>
        </label>
      </section>

      <section class="grid gap-2 text-sm">
        <label class="flex items-center justify-between gap-3">
          <span>High contrast</span>
          <input id="contrastMode" class="h-4 w-4" type="checkbox">
        </label>

        <label class="flex items-center justify-between gap-3">
          <span>Highlight links</span>
          <input id="highlightLinks" class="h-4 w-4" type="checkbox">
        </label>

        <label class="flex items-center justify-between gap-3">
          <span>Hide images</span>
          <input id="hideImages" class="h-4 w-4" type="checkbox">
        </label>

        <label class="flex items-center justify-between gap-3">
          <span>Stop animations</span>
          <input id="stopAnimations" class="h-4 w-4" type="checkbox">
        </label>
      </section>

      <section class="grid grid-cols-2 gap-2">
        <button id="speakPage" class="rounded bg-gray-900 px-3 py-2 text-sm font-medium text-white" type="button">
          Speak
        </button>
        <button id="stopSpeech" class="rounded border border-gray-300 bg-white px-3 py-2 text-sm font-medium" type="button">
          Stop
        </button>
        <button id="toggleSidebar" class="rounded border border-gray-300 bg-white px-3 py-2 text-sm font-medium" type="button">
          Sidebar
        </button>
        <button id="resetSettings" class="rounded border border-gray-300 bg-white px-3 py-2 text-sm font-medium" type="button">
          Reset
        </button>
      </section>

      <p id="status" class="text-xs text-gray-600" role="status"></p>
    </main>

    <script src="../modules/constants.js"></script>
    <script src="../modules/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
